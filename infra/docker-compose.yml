# Локальне середовище, що імітує продакшн із обмеженими ресурсами.
# Ліміти CPU/пам'яті задані навмисно невеликими, щоб baseline-архітектура
# гарантовано демонструвала каскадну відмову під навантаженням (Фаза 3.1),
# а результати тестів були відтворюваними.
#
# Запуск:   docker compose -f infra/docker-compose.yml up --build
# Зупинка:  docker compose -f infra/docker-compose.yml down -v

name: diploma

services:
  postgres:
    image: postgres:17
    # Константа стенду: synchronous_commit=off прибирає очікування fsync на кожен
    # commit. Так binding-обмеженням лишаються потоки/архітектура застосунку, а не
    # дискова латентність БД. Значення однакове в усіх фазах → на порівняння не впливає.
    command: ["postgres", "-c", "synchronous_commit=off"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init-multiple-dbs.sql:/docker-entrypoint-initdb.d/init-multiple-dbs.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  payment-service:
    build:
      context: ..
      dockerfile: payment-service/Dockerfile
    environment:
      PAYMENT_DB_URL: jdbc:postgresql://postgres:5432/paymentdb
      PAYMENT_DB_USER: payment
      PAYMENT_DB_PASSWORD: payment
      # Стандарт стенду — 200 мс. Для fault-injection (демо деградації payment)
      # перевизначається: PAYMENT_DELAY_MS=2000 docker compose up -d payment-service
      PAYMENT_DELAY_MS: "${PAYMENT_DELAY_MS:-200}"
      # Фаза 3.2.1: віртуальні потоки і на payment (інакше його пул 50 стане стелею).
      SPRING_THREADS_VIRTUAL_ENABLED: "true"
      KAFKA_BOOTSTRAP: kafka:9092
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  order-service:
    build:
      context: ..
      dockerfile: order-service/Dockerfile
    environment:
      ORDER_DB_URL: jdbc:postgresql://postgres:5432/orderdb
      ORDER_DB_USER: order
      ORDER_DB_PASSWORD: order
      ORDER_DB_POOL: "10"
      PAYMENT_SERVICE_URL: http://payment-service:8081
      # Фаза 3.2.1: ВІРТУАЛЬНІ потоки (незалежна змінна). Прибирає ліміт пулу
      # платформних потоків (50). Решта стенду незмінна.
      SPRING_THREADS_VIRTUAL_ENABLED: "true"
      # Фаза 3.2.2: перемикач Timeout+CircuitBreaker (для порівняння «з CB / без CB»).
      PAYMENT_RESILIENCE_ENABLED: "${PAYMENT_RESILIENCE_ENABLED:-true}"
      # Фаза 3.2.3: Bulkhead доступу до БД + імітація повільного запиту.
      ORDER_BULKHEAD_ENABLED: "${ORDER_BULKHEAD_ENABLED:-true}"
      ORDER_DB_WORK_DELAY_MS: "${ORDER_DB_WORK_DELAY_MS:-0}"
      KAFKA_BOOTSTRAP: kafka:9092
    ports:
      # Хост-порт 8080 зайнятий локальним процесом, тож публікуємо на 18080.
      # Усередині docker-мережі сервіс лишається на 8080 (k6 б'є саме туди).
      - "18080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      payment-service:
        condition: service_started
      kafka:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  # --- Спостережуваність: k6 → Prometheus → Grafana ---
  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
      - --enable-feature=native-histograms
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # --- Apache Kafka (KRaft, без Zookeeper) — Розділ 3.3 ---
  kafka:
    image: apache/kafka:4.0.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: "PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # 12 партицій → до 12 паралельних споживачів у групі payment-service.
      # Інакше payment (200 мс/подія) обробляв би послідовно ~5 подій/с і не
      # встигав би за прийомом (Розділ 3.3.3, тест durability).
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    ports:
      - "8090:8080"
    depends_on:
      - kafka

volumes:
  pgdata:
  grafana-data:
