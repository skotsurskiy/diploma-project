spring:
  application:
    name: order-service
  datasource:
    url: ${ORDER_DB_URL:jdbc:postgresql://localhost:5432/orderdb}
    username: ${ORDER_DB_USER:order}
    password: ${ORDER_DB_PASSWORD:order}
    hikari:
      # Навмисно невеликий пул — у Фазі 3.2 саме він стає вузьким місцем
      # після ввімкнення віртуальних потоків.
      maximum-pool-size: ${ORDER_DB_POOL:10}
      connection-timeout: ${ORDER_DB_CONN_TIMEOUT:10000}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false

server:
  port: 8080
  tomcat:
    threads:
      # КОНТРОЛЬОВАНА ЗМІННА СТЕНДУ (фіксована для всіх фаз): 50 платформних
      # потоків. Стеля baseline ≈ 50 / 0.2с = 250 RPS. У 3.2 змінюється лише
      # МОДЕЛЬ потоків (віртуальні), а не це число.
      max: 50
    # Обмежена черга: надлишок понад потоки+чергу отримує відмову (а не
    # нескінченне очікування), тож вичерпання потоків стає ВИДИМИМ як 503/timeout.
    accept-count: 100
    max-connections: 150

# Фаза 3.1: платформні потоки. У Фазі 3.2 вмикаємо віртуальні потоки.
# spring.threads.virtual.enabled керується через змінну середовища.

payment:
  service:
    url: ${PAYMENT_SERVICE_URL:http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
