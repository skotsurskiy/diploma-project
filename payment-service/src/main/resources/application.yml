spring:
  application:
    name: payment-service
  datasource:
    url: ${PAYMENT_DB_URL:jdbc:postgresql://localhost:5432/paymentdb}
    username: ${PAYMENT_DB_USER:payment}
    password: ${PAYMENT_DB_PASSWORD:payment}
    hikari:
      maximum-pool-size: ${PAYMENT_DB_POOL:20}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false

server:
  port: 8081
  tomcat:
    threads:
      max: 200

payment:
  processing-delay-ms: ${PAYMENT_DELAY_MS:200}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
