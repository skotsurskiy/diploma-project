spring:
  application:
    name: payment-service
  datasource:
    url: ${PAYMENT_DB_URL:jdbc:postgresql://localhost:5432/paymentdb}
    username: ${PAYMENT_DB_USER:payment}
    password: ${PAYMENT_DB_PASSWORD:payment}
    hikari:
      maximum-pool-size: ${PAYMENT_DB_POOL:20}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8081
  tomcat:
    threads:
      # Контрольована змінна стенду (фіксована для всіх фаз): 50 платформних потоків.
      max: 50
    accept-count: 100
    max-connections: 150

payment:
  processing-delay-ms: ${PAYMENT_DELAY_MS:200}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
